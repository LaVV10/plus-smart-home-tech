server:
  port: 0

spring:
  application:
    name: analyzer

  datasource:
    url: ${ANALYZER_DB_URL:jdbc:h2:mem:analyzer}
    username: ${ANALYZER_DB_USERNAME:sa}
    password: ${ANALYZER_DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

analyzer:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    snapshots-topic: telemetry.snapshots.v1
    hubs-topic: telemetry.hubs.v1
    snapshots-group-id: analyzer-snapshots
    hubs-group-id: analyzer-hubs